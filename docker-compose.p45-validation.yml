services:
  postgresql:
    image: postgres:16-alpine
    ports:
      - "${ZEPHYR_P45_POSTGRES_PORT:-15432}:5432"
    environment:
      POSTGRES_USER: "${ZEPHYR_P45_POSTGRES_USER:-zephyr}"
      POSTGRES_PASSWORD: "${ZEPHYR_P45_POSTGRES_PASSWORD:-zephyr}"
      POSTGRES_DB: "${ZEPHYR_P45_POSTGRES_DB:-zephyr}"
    restart: unless-stopped

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.5
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:19092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092,OUTSIDE://localhost:${ZEPHYR_P45_KAFKA_PORT:-19092}
      - --rpc-addr
      - 0.0.0.0:33145
      - --advertise-rpc-addr
      - redpanda:33145
    ports:
      - "${ZEPHYR_P45_KAFKA_PORT:-19092}:19092"
      - "${ZEPHYR_P45_REDPANDA_ADMIN_PORT:-19644}:9644"
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    command: server /data --console-address ":9001"
    ports:
      - "${ZEPHYR_P45_S3_PORT:-19000}:9000"
      - "19001:9001"
    environment:
      MINIO_ROOT_USER: "${ZEPHYR_P45_S3_ACCESS_KEY:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${ZEPHYR_P45_S3_SECRET_KEY:-minioadmin}"
    restart: unless-stopped

  opensearch:
    image: opensearchproject/opensearch:2.17.1
    ports:
      - "${ZEPHYR_P45_OPENSEARCH_PORT:-19200}:9200"
    environment:
      discovery.type: single-node
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: "${ZEPHYR_P45_OPENSEARCH_PASSWORD}"
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    ports:
      - "${ZEPHYR_P45_CLICKHOUSE_PORT:-18123}:8123"
      - "19010:9000"
    environment:
      CLICKHOUSE_DB: zephyr
      CLICKHOUSE_USER: "${ZEPHYR_P45_CLICKHOUSE_USERNAME:-default}"
      CLICKHOUSE_PASSWORD: "${ZEPHYR_P45_CLICKHOUSE_PASSWORD:-}"
    restart: unless-stopped

  mongodb:
    image: mongo:7
    ports:
      - "${ZEPHYR_P45_MONGODB_PORT:-27018}:27017"
    restart: unless-stopped

  loki:
    image: grafana/loki:3.1.1
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "${ZEPHYR_P45_LOKI_PORT:-13100}:3100"
    restart: unless-stopped

  weaviate:
    image: semitechnologies/weaviate:1.27.5
    ports:
      - "${ZEPHYR_P45_WEAVIATE_PORT:-18080}:8080"
      - "${ZEPHYR_P45_WEAVIATE_GRPC_PORT:-15051}:50051"
    environment:
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: none
      ENABLE_MODULES: ""
      CLUSTER_HOSTNAME: node1
    restart: unless-stopped

  http-fixture:
    image: python:3.12-slim
    working_dir: /workspace
    command: python tools/p45_http_fixture_server.py
    environment:
      ZEPHYR_P45_HTTP_FIXTURE_BIND: 0.0.0.0
      ZEPHYR_P45_HTTP_FIXTURE_LISTEN_PORT: "8080"
    ports:
      - "${ZEPHYR_P45_HTTP_FIXTURE_PORT:-18081}:8080"
    volumes:
      - .:/workspace:ro
    restart: unless-stopped

  webhook-echo:
    image: python:3.12-slim
    working_dir: /workspace
    command: python tools/p45_webhook_echo_server.py
    environment:
      ZEPHYR_P45_WEBHOOK_ECHO_BIND: 0.0.0.0
      ZEPHYR_P45_WEBHOOK_ECHO_LISTEN_PORT: "8080"
    ports:
      - "${ZEPHYR_P45_WEBHOOK_ECHO_PORT:-18082}:8080"
    volumes:
      - .:/workspace:ro
    restart: unless-stopped
