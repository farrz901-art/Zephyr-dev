[project]
name = "zephyr-ingest"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
authors = [
    { name = "farr-lesende", email = "1602058210@qq.com" }
]
requires-python = ">=3.12"
dependencies = [
    "httpx>=0.28.1",
    "it-stream",
    "uns-stream",
    "zephyr-core",
]

[project.optional-dependencies]
kafka = [
    "confluent-kafka>=2.3.0",
]
weaviate = [
  "weaviate-client>=4.20.4,<5",
]

[project.scripts]
zephyr-ingest = "zephyr_ingest.cli:main"

[build-system]
requires = ["uv_build>=0.10.8,<0.11.0"]
build-backend = "uv_build"

[tool.uv.sources]
it-stream = { workspace = true }
zephyr-core = { workspace = true }
uns-stream = { workspace = true }
